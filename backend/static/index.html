<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care.AI Voice Test Client</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        .container { border: 1px solid #ccc; padding: 1.5rem; border-radius: 8px; }
        .status { margin-bottom: 1rem; font-weight: bold; }
        .controls { margin-bottom: 1rem; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        #log { background: #f4f4f4; padding: 1rem; height: 300px; overflow-y: auto; border-radius: 4px; font-family: monospace; white-space: pre-wrap; }
        .user { color: blue; }
        .ai { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Care.AI Voice Test Client</h1>
    <div class="container">
        <div class="status" id="status">Status: Disconnected</div>
        <div class="controls">
            <button id="connectBtn">Connect WebSocket</button>
            <button id="recordBtn" disabled>Start Recording</button>
            <button id="stopBtn" disabled>Stop Recording</button>
        </div>
        <h3>Conversation Log</h3>
        <div id="log"></div>
    </div>

    <script>
        let ws;
        let mediaRecorder;
        let audioChunks = [];
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');
        const connectBtn = document.getElementById('connectBtn');
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');

        function appendLog(text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        connectBtn.onclick = () => {
            ws = new WebSocket('ws://localhost:8000/api/v1/ws/voice');
            
            ws.onopen = () => {
                statusEl.textContent = 'Status: Connected';
                connectBtn.disabled = true;
                recordBtn.disabled = false;
                appendLog('WebSocket Connected', 'ai');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'status') {
                    appendLog(`Status: ${data.status}`, 'ai');
                } else if (data.type === 'transcription') {
                    appendLog(`You said: ${data.text} (${data.language})`, 'user');
                } else if (data.type === 'ai_response') {
                    appendLog(`AI: ${data.text}`, 'ai');
                } else if (data.type === 'error') {
                    appendLog(`Error: ${data.message}`, 'error');
                }
            };

            ws.onclose = () => {
                statusEl.textContent = 'Status: Disconnected';
                connectBtn.disabled = false;
                recordBtn.disabled = true;
                stopBtn.disabled = true;
                appendLog('WebSocket Disconnected', 'error');
            };
        };

        recordBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        ws.send(event.data);
                    }
                };

                // Send audio in chunks every 1 second
                mediaRecorder.start(1000);
                
                recordBtn.disabled = true;
                stopBtn.disabled = false;
                appendLog('Recording started...', 'ai');
            } catch (err) {
                appendLog(`Error accessing microphone: ${err.message}`, 'error');
            }
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            recordBtn.disabled = false;
            stopBtn.disabled = true;
            appendLog('Recording stopped.', 'ai');
        };
    </script>
</body>
</html>
