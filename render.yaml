services:
  - type: web
    name: care-ai-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: care-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: care-ai-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: OPENAI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo

databases:
  - name: care-ai-db
    databaseName: careai
    user: careai_user

redises:
  - name: care-ai-redis
    ipAllowList: [] # Only allow internal connections
